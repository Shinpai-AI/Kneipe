name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install appimagetool
        run: |
          wget -q -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          mkdir -p Kneipe.AppDir/usr/share/kneipe
          # Copy app files
          cp server.py index.html requirements.txt start.sh converter.py kneipe-tray.py Kneipe.AppDir/usr/share/kneipe/ 2>/dev/null || true
          cp -r Themen badges Kneipe.AppDir/usr/share/kneipe/ 2>/dev/null || true
          cp *.png *.ico *.jpg *.json *.xml *.js *.mp3 *.html *.webp Kneipe.AppDir/usr/share/kneipe/ 2>/dev/null || true
          # AppDir structure
          cp installer/linux/AppRun Kneipe.AppDir/AppRun
          chmod +x Kneipe.AppDir/AppRun
          cp installer/linux/kneipe.desktop Kneipe.AppDir/
          cp kneipe.png Kneipe.AppDir/kneipe.png 2>/dev/null || true
          ln -sf kneipe.png Kneipe.AppDir/.DirIcon
          # Build
          ARCH=x86_64 ./appimagetool --no-appstream Kneipe.AppDir Kneipe-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: Kneipe-Linux-AppImage
          path: Kneipe-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Build liboqs from source
        shell: pwsh
        run: |
          # liboqs-python 0.14.1 hat kaputten Branch-Checkout, daher liboqs selber bauen
          git clone --depth 1 --branch main https://github.com/open-quantum-safe/liboqs.git
          cd liboqs
          mkdir build; cd build
          cmake -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE/liboqs-install" ..
          cmake --build . --config Release
          cmake --install . --config Release
          cd $env:GITHUB_WORKSPACE

      - name: Create Windows Installer
        shell: pwsh
        run: |
          # Create installer directory
          New-Item -ItemType Directory -Path "installer-build" -Force
          # Download embedded Python (ships with installer, no system Python needed!)
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" -OutFile "python-embed.zip"
          Expand-Archive -Path "python-embed.zip" -DestinationPath "installer-build/python" -Force
          # Enable site-packages in embedded Python
          (Get-Content "installer-build/python/python312._pth") -replace '#import site','import site' | Set-Content "installer-build/python/python312._pth"
          # Install deps — OHNE liboqs-python (pip install kaputt wegen Branch-Bug)
          New-Item -ItemType Directory -Path "installer-build/python/Lib/site-packages" -Force
          pip install pyotp qrcode Pillow edge-tts cryptography hdwallet bitcoin-utils pystray --target "installer-build/python/Lib/site-packages" --no-warn-script-location
          # liboqs-python MANUELL: Python-Wrapper von GitHub + kompilierte DLL
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs-python.git liboqs-py-src
          Copy-Item -Path "liboqs-py-src/oqs" -Destination "installer-build/python/Lib/site-packages/oqs" -Recurse
          # DLL in oqs Ordner + python Ordner kopieren
          Get-ChildItem "$env:GITHUB_WORKSPACE/liboqs-install" -Recurse -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination "installer-build/python/Lib/site-packages/oqs/" -ErrorAction SilentlyContinue
            Copy-Item $_.FullName -Destination "installer-build/python/" -ErrorAction SilentlyContinue
          }
          # oqs.py patchen damit sie die mitgelieferte DLL findet
          python installer/windows/patch_oqs.py "installer-build/python/Lib/site-packages/oqs"
          # Copy app files
          Copy-Item "server.py","index.html","requirements.txt","converter.py","kneipe-tray.py" -Destination "installer-build/" -ErrorAction SilentlyContinue
          Copy-Item -Path "Themen","badges" -Destination "installer-build/" -Recurse -ErrorAction SilentlyContinue
          Copy-Item "*.png","*.ico","*.jpg","*.json","*.xml","*.js","*.mp3","*.html","*.webp" -Destination "installer-build/" -ErrorAction SilentlyContinue
          # Copy .ico for installer icon
          Copy-Item "kneipe.ico" -Destination "installer-build/" -ErrorAction SilentlyContinue
          # Copy Inno Setup script
          Copy-Item "installer/windows/kneipe-setup.iss" -Destination "." -ErrorAction SilentlyContinue

      - name: Build with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: kneipe-setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: Kneipe-Windows-Setup
          path: Output/*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Kneipe-Linux-AppImage/Kneipe-x86_64.AppImage
            Kneipe-Windows-Setup/*.exe
          generate_release_notes: true
