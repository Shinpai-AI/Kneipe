name: kneipe
description: "Kneipen-Schlägerei — Mobile Voice-Chat Client (Greenfield v0.8)"
publish_to: 'none'
version: 0.8.6+94

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State + Navigation
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2

  # HTTP + Cookies
  dio: ^5.9.2
  dio_cookie_manager: ^3.4.0
  cookie_jar: ^4.0.9

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5

  # Audio + Mic
  record: ^6.2.0
  just_audio: ^0.10.5
  permission_handler: ^12.0.1
  audio_session: ^0.2.3

  # Whisper (lokal, Plugin macht Isolate.run intern)
  whisper_ggml_plus: ^1.5.2

  # System-TTS
  flutter_tts: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/kneipe.png"
  min_sdk_android: 24
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/kneipe.png"

flutter:
  uses-material-design: true

  assets:
    - assets/models/ggml-base.bin
    - assets/sounds/whisper-warnung.wav
    - assets/sounds/whisper-bereit.wav
    - assets/icon/kneipe.png
